{% extends "core/auth_base.html" %}
{% block title %}Senha alterada — MetalVault{% endblock %}

{% block content %}
<div class="auth-card">
  <div class="success-check">
    <i class="bi bi-check-lg"></i>
  </div>
  <div class="auth-title">Senha alterada com sucesso!</div>
  <div class="auth-desc">Sua nova senha já está ativa. Faça login para acessar seu acervo.</div>

  <a href="{% url 'login' %}" class="btn btn-primary w-100">
    <i class="bi bi-box-arrow-in-right me-1"></i> Entrar com nova senha
  </a>
</div>
{% endblock %}
