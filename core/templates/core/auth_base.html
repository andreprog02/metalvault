{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}MetalVault{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root { --mv-bg:#0f1117; --mv-surface:#1a1d27; --mv-surface2:#232733; --mv-border:#2e3345; --mv-text:#e4e6ed; --mv-muted:#9ea2b6; --mv-primary:#c9a94e; --mv-primary-soft:rgba(201,169,78,.12); }
    body { background:var(--mv-bg); color:var(--mv-text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .auth-wrapper { width:100%; max-width:440px; padding:1rem; }
    .auth-card { background:var(--mv-surface); border:1px solid var(--mv-border); border-radius:1.25rem; padding:2rem; box-shadow:0 25px 60px rgba(0,0,0,.5); position:relative; overflow:hidden; }
    .auth-card::before { content:''; position:absolute; top:0; left:2rem; right:2rem; height:3px; background:linear-gradient(90deg,var(--mv-primary),rgba(201,169,78,.2)); border-radius:0 0 3px 3px; }
    .brand { font-size:2.25rem; font-weight:800; background:linear-gradient(135deg,var(--mv-primary),#e8d48b); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .auth-icon { width:4rem; height:4rem; border-radius:1rem; background:var(--mv-primary-soft); display:flex; align-items:center; justify-content:center; margin:0 auto 1.25rem; }
    .auth-icon i { font-size:1.75rem; color:var(--mv-primary); }
    .auth-title { font-size:1.25rem; font-weight:700; color:#ffffff; text-align:center; margin-bottom:.35rem; }
    .auth-desc { font-size:.85rem; color:var(--mv-muted); text-align:center; margin-bottom:1.5rem; line-height:1.5; }
    .form-control { background:var(--mv-surface2); border:1px solid var(--mv-border); color:#ffffff; padding:.65rem 1rem; border-radius:.625rem; font-size:.9rem; }
    .form-control:focus { background:var(--mv-surface2); border-color:var(--mv-primary); color:#ffffff; box-shadow:0 0 0 .2rem rgba(201,169,78,.15); }
    .form-control::placeholder { color:#5c6078; }
    .form-label { font-size:.78rem; font-weight:600; color:#b0b4c8; text-transform:uppercase; letter-spacing:.04em; margin-bottom:.4rem; }
    .btn-primary { background:var(--mv-primary); border-color:var(--mv-primary); color:#111; font-weight:700; padding:.65rem; border-radius:.625rem; font-size:.9rem; }
    .btn-primary:hover { background:#dfc06a; border-color:#dfc06a; color:#111; }
    .btn-outline { background:transparent; border:1px solid var(--mv-border); color:#b0b4c8; font-weight:600; padding:.55rem; border-radius:.625rem; font-size:.85rem; }
    .btn-outline:hover { background:var(--mv-surface2); color:#ffffff; border-color:#4a4f65; }
    .auth-link { color:var(--mv-primary); text-decoration:none; font-size:.85rem; font-weight:600; }
    .auth-link:hover { color:#dfc06a; }
    .auth-divider { display:flex; align-items:center; gap:.75rem; margin:1.25rem 0; }
    .auth-divider::before, .auth-divider::after { content:''; flex:1; height:1px; background:var(--mv-border); }
    .auth-divider span { font-size:.72rem; color:#5c6078; text-transform:uppercase; letter-spacing:.06em; }
    .success-check { width:4rem; height:4rem; border-radius:50%; background:rgba(74,222,128,.1); display:flex; align-items:center; justify-content:center; margin:0 auto 1.25rem; }
    .success-check i { font-size:2rem; color:#4ade80; }
    .errorlist { list-style:none; padding:0; margin:.35rem 0 0; }
    .errorlist li { color:#f87171; font-size:.78rem; }
    .password-rules { font-size:.72rem; color:#787c90; line-height:1.6; margin-top:.5rem; }
  </style>
</head>
<body>
  <div class="auth-wrapper">
    <div class="text-center mb-4">
      <div class="brand">MetalVault</div>
    </div>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
